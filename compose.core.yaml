services:
  core:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    env_file:
      - ./docker/openclaw/.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.core.rule=Host(`ai-community-platform.org`) || Host(`localhost`)
      - traefik.http.routers.core.entrypoints=web
      - traefik.http.services.core.loadbalancer.server.port=80
      - traefik.http.middlewares.edge-auth.forwardauth.address=http://core/edge/auth/verify
      - traefik.http.middlewares.edge-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.edge-auth.forwardauth.authResponseHeaders=X-Forwarded-User
      # Route /edge/auth/ on any subdomain to core WITHOUT edge-auth (login must work on the subdomain itself)
      - traefik.http.routers.edge-auth-subdomain.rule=PathPrefix(`/edge/auth/`)
      - traefik.http.routers.edge-auth-subdomain.entrypoints=web
      - traefik.http.routers.edge-auth-subdomain.priority=300
      - traefik.http.routers.edge-auth-subdomain.service=core
    environment:
      LANGFUSE_ENABLED: "true"
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: lf_pk_local_dev
      LANGFUSE_SECRET_KEY: lf_sk_local_dev
      LANGFUSE_ENV: local
      ADMIN_OPENCLAW_URL: http://openclaw.localhost/
      ADMIN_LANGFUSE_URL: http://langfuse.localhost/
      ADMIN_TRAEFIK_URL: http://traefik.localhost/dashboard/
      ADMIN_LITELLM_URL: http://litellm.localhost/ui/
      EDGE_AUTH_JWT_SECRET: dev-edge-auth-secret-change-me
      EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
      EDGE_AUTH_TOKEN_TTL: 43200
      EDGE_AUTH_LOGIN_BASE_URL: http://localhost
      EDGE_AUTH_COOKIE_DOMAIN: localhost
    volumes:
      - ./apps/core:/var/www/html
    networks:
      - dev-edge

  core-scheduler:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    env_file:
      - ./docker/openclaw/.env
    command: ["php", "bin/console", "scheduler:run"]
    environment:
      LANGFUSE_ENABLED: "true"
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: lf_pk_local_dev
      LANGFUSE_SECRET_KEY: lf_sk_local_dev
      LANGFUSE_ENV: local
      ADMIN_OPENCLAW_URL: http://openclaw.localhost/
      ADMIN_LANGFUSE_URL: http://langfuse.localhost/
      ADMIN_TRAEFIK_URL: http://traefik.localhost/dashboard/
      ADMIN_LITELLM_URL: http://litellm.localhost/ui/
      EDGE_AUTH_JWT_SECRET: dev-edge-auth-secret-change-me
      EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
      EDGE_AUTH_TOKEN_TTL: 43200
      EDGE_AUTH_LOGIN_BASE_URL: http://localhost
      EDGE_AUTH_COOKIE_DOMAIN: localhost
    volumes:
      - ./apps/core:/var/www/html
    depends_on:
      - core
    restart: unless-stopped
    networks:
      - dev-edge

  core-e2e:
    profiles: [e2e]
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    env_file:
      - ./docker/openclaw/.env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/ai_community_platform_test?serverVersion=16&charset=utf8
      POSTGRES_PROVISIONER_URL: postgresql://app:app@postgres:5432/postgres?serverVersion=16&charset=utf8
      LANGFUSE_ENABLED: "false"
      EDGE_AUTH_JWT_SECRET: dev-edge-auth-secret-change-me
      EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
      EDGE_AUTH_TOKEN_TTL: 43200
      EDGE_AUTH_LOGIN_BASE_URL: http://localhost:18080
      EDGE_AUTH_COOKIE_DOMAIN: localhost
      ADMIN_OPENCLAW_URL: http://openclaw.localhost/
      ADMIN_LANGFUSE_URL: http://langfuse.localhost/
      ADMIN_TRAEFIK_URL: http://traefik.localhost/dashboard/
      ADMIN_LITELLM_URL: http://litellm.localhost/ui/
    ports:
      - "18080:80"
    volumes:
      - ./apps/core:/var/www/html
    depends_on:
      - postgres
    networks:
      - dev-edge
