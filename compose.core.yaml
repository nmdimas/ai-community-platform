services:
  core:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    env_file:
      - ./docker/openclaw/.env
    labels:
      - traefik.enable=true
        # Public site
      - traefik.http.routers.core-public.rule=Host(`ai-community-platform.org`) || Host(`localhost`)
      - traefik.http.routers.core-public.entrypoints=web
      - traefik.http.routers.core-public.service=core

        # Admin subdomain
      - traefik.http.routers.core-admin.rule=Host(`admin.ai-community-platform.org`) && PathPrefix(`/admin`)
      - traefik.http.routers.core-admin.entrypoints=web
      - traefik.http.routers.core-admin.service=core
    environment:
      LANGFUSE_ENABLED: "true"
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: lf_pk_local_dev
      LANGFUSE_SECRET_KEY: lf_sk_local_dev
      LANGFUSE_ENV: local
      ADMIN_OPENCLAW_URL: http://localhost:8082
      ADMIN_LANGFUSE_URL: http://localhost:8086
      ADMIN_TRAEFIK_URL: http://localhost:8080/dashboard/
      ADMIN_LITELLM_URL: http://localhost:4000
      EDGE_AUTH_JWT_SECRET: dev-edge-auth-secret-change-me
      EDGE_AUTH_COOKIE_NAME: ACP_EDGE_TOKEN
      EDGE_AUTH_TOKEN_TTL: 43200
      EDGE_AUTH_LOGIN_BASE_URL: http://localhost
    volumes:
      - ./apps/core:/var/www/html
    networks:
      - dev-edge
