parameters:
    app.internal_token: '%env(APP_INTERNAL_TOKEN)%'
    app.openclaw_gateway_token: '%env(OPENCLAW_GATEWAY_TOKEN)%'
    app.openclaw_discovery_push_url: '%env(OPENCLAW_DISCOVERY_PUSH_URL)%'
    app.redis_url: '%env(REDIS_URL)%'
    app.opensearch_url: '%env(OPENSEARCH_URL)%'
    app.log_app_name: 'core'
    app.log_retention_days: 7
    app.log_max_size_gb: 2
    app.langfuse_enabled: '%env(bool:LANGFUSE_ENABLED)%'
    app.langfuse_base_url: '%env(LANGFUSE_BASE_URL)%'
    app.langfuse_public_key: '%env(LANGFUSE_PUBLIC_KEY)%'
    app.langfuse_secret_key: '%env(LANGFUSE_SECRET_KEY)%'
    app.langfuse_environment: '%env(LANGFUSE_ENV)%'
    app.admin_openclaw_url: '%env(ADMIN_OPENCLAW_URL)%'
    app.admin_langfuse_url: '%env(ADMIN_LANGFUSE_URL)%'
    app.admin_traefik_url: '%env(ADMIN_TRAEFIK_URL)%'
    app.admin_litellm_url: '%env(ADMIN_LITELLM_URL)%'
    app.edge_auth_jwt_secret: '%env(EDGE_AUTH_JWT_SECRET)%'
    app.edge_auth_cookie_name: '%env(EDGE_AUTH_COOKIE_NAME)%'
    app.edge_auth_token_ttl: '%env(int:EDGE_AUTH_TOKEN_TTL)%'
    app.edge_auth_login_base_url: '%env(EDGE_AUTH_LOGIN_BASE_URL)%'
    app.edge_auth_cookie_domain: '%env(EDGE_AUTH_COOKIE_DOMAIN)%'
    app.litellm_base_url: '%env(LITELLM_BASE_URL)%'
    app.litellm_api_key: '%env(LITELLM_API_KEY)%'
    app.llm_model: '%env(LLM_MODEL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Security/AdminUser.php'
            - '../src/Kernel.php'

    App\AgentRegistry\AgentRegistryRepository:
        arguments:
            $cache: '@cache.agent_registry'

    App\A2AGateway\SkillCatalogSyncService:
        arguments:
            $cache: '@cache.agent_registry'
            $pushUrl: '%app.openclaw_discovery_push_url%'
            $gatewayToken: '%app.openclaw_gateway_token%'

    App\Controller\Api\A2AGateway\DiscoveryController:
        arguments:
            $cache: '@cache.agent_registry'
            $gatewayToken: '%app.openclaw_gateway_token%'

    App\Controller\Api\A2AGateway\SendMessageController:
        arguments:
            $gatewayToken: '%app.openclaw_gateway_token%'

    App\A2AGateway\A2AClient:
        arguments:
            $internalToken: '%app.internal_token%'

    App\AgentInstaller\Strategy\PostgresInstallStrategy:
        arguments:
            $connection: '@doctrine.dbal.provisioner_connection'

    App\AgentInstaller\Strategy\RedisInstallStrategy:
        arguments:
            $redisUrl: '%app.redis_url%'

    App\AgentInstaller\Strategy\OpenSearchInstallStrategy:
        arguments:
            $openSearchUrl: '%app.opensearch_url%'

    App\AgentInstaller\AgentInstallerService:
        arguments:
            $postgres: '@App\AgentInstaller\Strategy\PostgresInstallStrategy'
            $redis: '@App\AgentInstaller\Strategy\RedisInstallStrategy'
            $opensearch: '@App\AgentInstaller\Strategy\OpenSearchInstallStrategy'

    App\AgentInstaller\AgentMigrationTrigger:
        arguments:
            $internalToken: '%app.internal_token%'

    App\AgentAction\NewsCrawlTrigger:
        arguments:
            $internalToken: '%app.internal_token%'

    App\Observability\LangfuseIngestionClient:
        arguments:
            $enabled: '%app.langfuse_enabled%'
            $baseUrl: '%app.langfuse_base_url%'
            $publicKey: '%app.langfuse_public_key%'
            $secretKey: '%app.langfuse_secret_key%'
            $environment: '%app.langfuse_environment%'

    App\EdgeAuth\EdgeJwtService:
        arguments:
            $secret: '%app.edge_auth_jwt_secret%'

    App\Controller\EdgeAuth\LoginController:
        arguments:
            $cookieName: '%app.edge_auth_cookie_name%'
            $tokenTtlSeconds: '%app.edge_auth_token_ttl%'

    App\Controller\EdgeAuth\VerifyController:
        arguments:
            $cookieName: '%app.edge_auth_cookie_name%'
            $loginBaseUrl: '%app.edge_auth_login_base_url%'

    App\Logging\LogSettingsProvider:
        arguments:
            $settingsPath: '%kernel.project_dir%/var/log_settings.json'

    App\Logging\OpenSearchHandler:
        arguments:
            $opensearchUrl: '%app.opensearch_url%'
            $settingsProvider: '@App\Logging\LogSettingsProvider'

    App\Logging\OpenSearchProcessor:
        arguments:
            $appName: '%app.log_app_name%'
        tags:
            - { name: monolog.processor }

    App\Logging\LogSearchInterface:
        alias: App\Logging\LogIndexManager

    App\Logging\LogIndexManager:
        arguments:
            $opensearchUrl: '%app.opensearch_url%'

    App\Command\LogsCleanupCommand:
        arguments:
            $defaultRetentionDays: '%app.log_retention_days%'
            $defaultMaxSizeGb: '%app.log_max_size_gb%'

    App\LLM\LiteLlmClient:
        arguments:
            $baseUrl: '%app.litellm_base_url%'
            $apiKey: '%app.litellm_api_key%'
            $model: '%app.llm_model%'

    App\AgentProject\AgentProjectRepositoryInterface:
        alias: App\AgentProject\AgentProjectRepository
        public: true

    App\AgentProject\CredentialResolverInterface:
        alias: App\AgentProject\EnvCredentialResolver
