security:
    password_hashers:
        App\Security\AdminUser:
            algorithm: bcrypt

    providers:
        admin_users:
            id: App\Security\AdminUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        admin:
            pattern: ^/(admin|api/v1/internal)
            provider: admin_users
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin_dashboard
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/internal/agents/register$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api/v1/internal, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            App\Security\AdminUser:
                algorithm: auto
                cost: 4
        firewalls:
            admin:
                form_login:
                    enable_csrf: false
