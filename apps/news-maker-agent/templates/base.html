<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}News Maker Agent{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        :root {
            --nm-bg: #0b1220;
            --nm-surface: #111c2f;
            --nm-surface-strong: #172742;
            --nm-border: #243754;
            --nm-text: #e2e8f0;
            --nm-muted: #9fb1cc;
            --nm-accent: #3b82f6;
            --nm-success: #22c55e;
            --nm-danger: #ef4444;
            --nm-warning: #f59e0b;
        }

        html, body { min-height: 100%; }
        body {
            margin: 0;
            padding-top: 64px;
            color: var(--nm-text);
            background:
                radial-gradient(1200px 600px at 90% -10%, rgba(59, 130, 246, .18), transparent 58%),
                radial-gradient(900px 500px at 0% 0%, rgba(56, 189, 248, .12), transparent 60%),
                var(--nm-bg);
            font-family: "Manrope", "Segoe UI Variable", "Trebuchet MS", sans-serif;
        }

        body[data-embedded="1"] {
            padding-top: 14px;
        }

        .agent-navbar {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 10;
            border-bottom: 1px solid var(--nm-border);
            background: rgba(10, 17, 30, .9);
            backdrop-filter: blur(8px);
        }

        body[data-embedded="1"] .agent-navbar {
            position: sticky;
            top: 0;
            margin: 0 14px 14px;
            border: 1px solid var(--nm-border);
            border-radius: 12px;
            background: rgba(13, 22, 38, .96);
        }

        .agent-navbar .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--nm-text);
        }

        .agent-navbar .nav-link {
            color: var(--nm-muted);
        }

        .agent-navbar .nav-link:hover,
        .agent-navbar .nav-link:focus {
            color: #dbeafe;
        }

        .app-shell {
            width: 100%;
            max-width: 1420px;
            margin: 0 auto;
            padding: 0 16px 16px;
        }

        body[data-embedded="1"] .app-shell {
            max-width: none;
            padding: 0 10px 10px;
        }

        .card,
        .modal-content {
            background: var(--nm-surface);
            border: 1px solid var(--nm-border);
            color: var(--nm-text);
            box-shadow: 0 12px 26px rgba(2, 6, 23, .26);
        }

        .card-header,
        .modal-header,
        .modal-footer {
            border-color: var(--nm-border);
            background: linear-gradient(180deg, rgba(23, 39, 66, .95), rgba(17, 28, 47, .95));
            color: var(--nm-text);
        }

        .table {
            --bs-table-color: var(--nm-text);
            --bs-table-bg: transparent;
            --bs-table-border-color: var(--nm-border);
            margin-bottom: 0;
        }

        .table > :not(caption) > * > * {
            background: rgba(15, 24, 41, .35);
            border-bottom-color: var(--nm-border);
            color: var(--nm-text);
        }

        .table-hover > tbody > tr:hover > * {
            background: rgba(59, 130, 246, .12);
        }

        .table-dark > :not(caption) > * > * {
            background: #101a2f;
            color: #dbeafe;
        }

        .table-success {
            --bs-table-bg: rgba(34, 197, 94, .12);
            --bs-table-color: var(--nm-text);
        }

        .table-danger {
            --bs-table-bg: rgba(239, 68, 68, .12);
            --bs-table-color: var(--nm-text);
        }

        .form-control,
        .form-select,
        .input-group-text {
            border-color: var(--nm-border);
            background-color: #0f1a2c;
            color: var(--nm-text);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--nm-accent);
            box-shadow: 0 0 0 .2rem rgba(59, 130, 246, .18);
            background-color: #0f1a2c;
            color: var(--nm-text);
        }

        .form-control::placeholder {
            color: #7591b3;
        }

        .form-check-input {
            background-color: #0f1a2c;
            border-color: var(--nm-border);
        }

        .form-text,
        .text-muted {
            color: #8fa6c6 !important;
        }

        .table-responsive {
            border: 1px solid var(--nm-border);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(15, 24, 41, .45);
        }

        .alert-info {
            color: #bfdbfe;
            background: rgba(37, 99, 235, .2);
            border-color: rgba(59, 130, 246, .45);
        }

        .alert-danger {
            color: #fecaca;
            background: rgba(239, 68, 68, .16);
            border-color: rgba(239, 68, 68, .35);
        }

        .btn-outline-secondary,
        .btn-outline-success,
        .btn-outline-warning,
        .btn-outline-danger {
            color: #cbd5e1;
            border-color: var(--nm-border);
        }

        .btn-outline-secondary:hover,
        .btn-outline-success:hover,
        .btn-outline-warning:hover,
        .btn-outline-danger:hover {
            background: rgba(148, 163, 184, .14);
            border-color: #94a3b8;
            color: #f8fafc;
        }

        a {
            color: #93c5fd;
        }

        a:hover {
            color: #dbeafe;
        }

        .status-running { color: var(--nm-warning); }
        .status-completed { color: var(--nm-success); }
        .status-failed { color: var(--nm-danger); }
    </style>
    {% block head %}{% endblock %}
</head>
<body data-embedded="{{ '1' if request.query_params.get('embedded') == '1' else '0' }}">
<nav class="navbar navbar-expand-lg agent-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">&#128240; News Maker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Новини</a>
            <a class="nav-link" href="/admin/sources">Джерела</a>
            <a class="nav-link" href="/admin/settings">Налаштування</a>
            <a class="nav-link text-muted small" href="/health">health</a>
        </div>
    </div>
</nav>

<main class="app-shell py-2">
    {% block content %}{% endblock %}
</main>

<script>
    (function () {
        try {
            if (window.self !== window.top) {
                document.body.dataset.embedded = "1";
            }
        } catch (e) {
            document.body.dataset.embedded = "1";
        }
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
