<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}News Maker Agent{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { padding-top: 60px; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .status-running { color: #fd7e14; }
        .status-completed { color: #198754; }
        .status-failed { color: #dc3545; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">&#128240; News Maker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Новини</a>
            <a class="nav-link" href="/admin/sources">Джерела</a>
            <a class="nav-link" href="/admin/settings">Налаштування</a>
            <a class="nav-link text-muted small" href="/health">health</a>
        </div>
    </div>
</nav>

<main class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
