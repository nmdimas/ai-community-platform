services:
  dev-reporter-agent:
    build:
      context: .
      dockerfile: docker/dev-reporter-agent/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.dev-reporter-agent.rule=PathPrefix(`/`)
      - traefik.http.routers.dev-reporter-agent.entrypoints=dev-reporter
      - traefik.http.routers.dev-reporter-agent.middlewares=edge-auth@docker
      - traefik.http.services.dev-reporter-agent.loadbalancer.server.port=80
      - ai.platform.agent=true
    environment:
      MIGRATE_ON_START: "1"
      DATABASE_URL: postgresql://dev_reporter_agent:dev_reporter_agent@postgres:5432/dev_reporter_agent?serverVersion=16&charset=utf8
      OPENSEARCH_URL: http://opensearch:9200
      APP_INTERNAL_TOKEN: dev-internal-token
      PLATFORM_CORE_URL: http://core
      ADMIN_PUBLIC_URL: http://localhost:8087/admin/pipeline
      LANGFUSE_ENABLED: "0"
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: lf_pk_local_dev
      LANGFUSE_SECRET_KEY: lf_sk_local_dev
      LANGFUSE_ENV: local
    volumes:
      - ./apps/dev-reporter-agent:/var/www/html
    depends_on:
      - postgres
      - opensearch
    networks:
      - dev-edge

  dev-reporter-agent-e2e:
    profiles: [e2e]
    build:
      context: .
      dockerfile: docker/dev-reporter-agent/Dockerfile
    environment:
      MIGRATE_ON_START: "1"
      DATABASE_URL: postgresql://dev_reporter_agent:dev_reporter_agent@postgres:5432/dev_reporter_agent_test?serverVersion=16&charset=utf8
      OPENSEARCH_URL: http://opensearch:9200
      APP_INTERNAL_TOKEN: dev-internal-token
      PLATFORM_CORE_URL: http://core-e2e
      ADMIN_PUBLIC_URL: http://localhost:18087/admin/pipeline
      LANGFUSE_ENABLED: "0"
    ports:
      - "18087:80"
    volumes:
      - ./apps/dev-reporter-agent:/var/www/html
    depends_on:
      - postgres
      - opensearch
    networks:
      - dev-edge
