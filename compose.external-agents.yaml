# =============================================================================
# compose.external-agents.yaml — External Agent Fragment Loader
# =============================================================================
#
# This file is the single entry point for all external agent compose fragments.
# Operators do NOT edit this file. Instead, they:
#
#   1. Clone an agent repository into projects/<agent-name>/
#   2. Copy or symlink the agent's compose fragment:
#        cp projects/<agent-name>/compose.fragment.yaml \
#           compose.fragments/<agent-name>.yaml
#   3. Run: make external-agent-up name=<agent-name>
#
# This file is auto-discovered by the Makefile via the EXTERNAL_AGENT_FILES
# variable. It is included in the compose stack only when external agent
# fragments exist under compose.fragments/.
#
# See docs/guides/external-agents/ for the full onboarding guide.
# =============================================================================

# No services defined here — this file exists to document the convention.
# Actual external agent services are loaded from compose.fragments/*.yaml
# via the Makefile EXTERNAL_AGENT_FILES variable.
