framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true
    default_locale: uk
    php_errors:
        log: true
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks:
            - uk
