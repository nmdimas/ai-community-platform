apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  replicas: {{ .Values.core.replicaCount }}
  selector:
    matchLabels:
      {{- include "acp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        {{- include "acp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: core
    spec:
      {{- include "acp.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "acp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: core
          image: "{{ .Values.core.image.repository }}:{{ .Values.core.image.tag }}"
          imagePullPolicy: {{ .Values.core.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            {{- range $key, $value := .Values.core.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.core.secretRef }}
          envFrom:
            - secretRef:
                name: {{ .Values.core.secretRef }}
          {{- end }}
          readinessProbe:
            {{- toYaml .Values.core.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.core.livenessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.core.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
