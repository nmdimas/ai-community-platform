{{- if .Values.website.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "acp.fullname" . }}-website
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: website
spec:
  type: {{ .Values.website.service.type }}
  ports:
    - port: {{ .Values.website.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "acp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: website
{{- end }}
