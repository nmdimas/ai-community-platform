{{- if .Values.website.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-website
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: website
spec:
  replicas: {{ .Values.website.replicaCount }}
  selector:
    matchLabels:
      {{- include "acp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: website
  template:
    metadata:
      labels:
        {{- include "acp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: website
    spec:
      {{- include "acp.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "acp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: website
          image: "{{ .Values.website.image.repository }}:{{ .Values.website.image.tag }}"
          imagePullPolicy: {{ .Values.website.image.pullPolicy | default .Values.global.imagePullPolicy }}
          command:
            - python
            - -m
            - http.server
            - "{{ .Values.website.containerPort }}"
            - --directory
            - /srv/website
          ports:
            - name: http
              containerPort: {{ .Values.website.containerPort }}
              protocol: TCP
          volumeMounts:
            - name: website-content
              mountPath: /srv/website/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.website.resources | nindent 12 }}
      volumes:
        - name: website-content
          configMap:
            name: {{ include "acp.fullname" . }}-website
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
