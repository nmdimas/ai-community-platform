{{- if .Values.website.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "acp.fullname" . }}-website
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: website
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Website</title>
        <style>
          :root {
            color-scheme: light;
            --bg-top: #f7ead8;
            --bg-bottom: #f4f7fb;
            --ink: #14213d;
            --muted: #516074;
            --line: rgba(20, 33, 61, 0.12);
            --card: rgba(255, 255, 255, 0.78);
            --accent: #d97706;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
              radial-gradient(circle at top left, rgba(217, 119, 6, 0.16), transparent 28%),
              linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
          }
          main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px;
          }
          section {
            width: min(720px, 100%);
            padding: 48px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            box-shadow: 0 24px 80px rgba(20, 33, 61, 0.08);
            backdrop-filter: blur(18px);
          }
          p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.6;
          }
          .eyebrow {
            margin-bottom: 18px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
          }
          h1 {
            margin: 0 0 18px;
            font-size: clamp(40px, 9vw, 72px);
            line-height: 0.96;
            letter-spacing: -0.05em;
          }
          .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(20, 33, 61, 0.06);
            color: var(--ink);
            font-size: 14px;
          }
          .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 6px rgba(217, 119, 6, 0.12);
          }
        </style>
      </head>
      <body>
        <main>
          <section>
            <div class="eyebrow">Brama / Website</div>
            <h1>Coming soon.</h1>
            <p>
              Website will become the public landing page for the Brama platform. For now this endpoint
              is a placeholder so the workspace, routing, and k3s flow can evolve in parallel with
              the actual frontend work.
            </p>
            <p>
              Current runtime contract: static page in Kubernetes, isolated from the core application.
            </p>
            <div class="status">
              <span class="dot"></span>
              <span>Endpoint reserved for the landing service</span>
            </div>
          </section>
        </main>
      </body>
    </html>
{{- end }}
