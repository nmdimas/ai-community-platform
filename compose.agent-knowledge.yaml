services:
  knowledge-agent:
    build:
      context: .
      dockerfile: docker/knowledge-agent/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.knowledge-agent.rule=PathPrefix(`/`)
      - traefik.http.routers.knowledge-agent.entrypoints=knowledge
      - traefik.http.routers.knowledge-agent.middlewares=edge-auth@docker
      - traefik.http.services.knowledge-agent.loadbalancer.server.port=80
      - ai.platform.agent=true
    environment:
      PHP_INI_SCAN_DIR: /var/www/html/conf.d:/usr/local/etc/php/conf.d
      MIGRATE_ON_START: "1"
      DATABASE_URL: postgresql://knowledge_agent:knowledge_agent@postgres:5432/knowledge_agent?serverVersion=16&charset=utf8
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: knowledge_agent_knowledge_entries
      REDIS_URL: redis://redis:6379/2
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672
      APP_INTERNAL_TOKEN: dev-internal-token
      PLATFORM_CORE_URL: http://core
      LANGFUSE_ENABLED: "0"
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: lf_pk_local_dev
      LANGFUSE_SECRET_KEY: lf_sk_local_dev
      LANGFUSE_ENV: local
    volumes:
      - ./apps/knowledge-agent:/var/www/html
    depends_on:
      - postgres
      - opensearch
      - rabbitmq
    networks:
      - dev-edge

  knowledge-worker:
    build:
      context: .
      dockerfile: docker/knowledge-agent/Dockerfile
    command: php bin/console knowledge:worker
    environment:
      PHP_INI_SCAN_DIR: /var/www/html/conf.d:/usr/local/etc/php/conf.d
      MIGRATE_ON_START: "0"
      DATABASE_URL: postgresql://knowledge_agent:knowledge_agent@postgres:5432/knowledge_agent?serverVersion=16&charset=utf8
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: knowledge_agent_knowledge_entries
      REDIS_URL: redis://redis:6379/2
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672
      APP_INTERNAL_TOKEN: dev-internal-token
    volumes:
      - ./apps/knowledge-agent:/var/www/html
    depends_on:
      - postgres
      - opensearch
      - rabbitmq
      - litellm
    networks:
      - dev-edge
    restart: unless-stopped

  knowledge-agent-e2e:
    profiles: [e2e]
    build:
      context: .
      dockerfile: docker/knowledge-agent/Dockerfile
    environment:
      PHP_INI_SCAN_DIR: /var/www/html/conf.d:/usr/local/etc/php/conf.d
      MIGRATE_ON_START: "1"
      DATABASE_URL: postgresql://knowledge_agent:knowledge_agent@postgres:5432/knowledge_agent_test?serverVersion=16&charset=utf8
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: knowledge_agent_knowledge_entries_test
      REDIS_URL: redis://redis:6379/3
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/test
      APP_INTERNAL_TOKEN: dev-internal-token
      PLATFORM_CORE_URL: http://core-e2e
      ADMIN_PUBLIC_URL: http://localhost:18083/admin/knowledge
      LANGFUSE_ENABLED: "0"
    ports:
      - "18083:80"
    volumes:
      - ./apps/knowledge-agent:/var/www/html
    depends_on:
      - postgres
      - opensearch
      - rabbitmq
    networks:
      - dev-edge

  knowledge-worker-e2e:
    profiles: [e2e]
    build:
      context: .
      dockerfile: docker/knowledge-agent/Dockerfile
    command: php bin/console knowledge:worker
    environment:
      PHP_INI_SCAN_DIR: /var/www/html/conf.d:/usr/local/etc/php/conf.d
      MIGRATE_ON_START: "0"
      DATABASE_URL: postgresql://knowledge_agent:knowledge_agent@postgres:5432/knowledge_agent_test?serverVersion=16&charset=utf8
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: knowledge_agent_knowledge_entries_test
      REDIS_URL: redis://redis:6379/3
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/test
      APP_INTERNAL_TOKEN: dev-internal-token
    volumes:
      - ./apps/knowledge-agent:/var/www/html
    depends_on:
      - postgres
      - opensearch
      - rabbitmq
    networks:
      - dev-edge
    restart: unless-stopped
