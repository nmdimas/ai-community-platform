api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  admin:
    address: ":8081"
  openclaw:
    address: ":8082"
  knowledge:
    address: ":8083"
  news:
    address: ":8084"
  hello:
    address: ":8085"
  langfuse:
    address: ":8086"
  dev-reporter:
    address: ":8087"
  wiki:
    address: ":8090"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false

log:
  level: INFO

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        X-Request-Id: keep
        X-Service-Name: keep
        X-Agent-Name: keep
        X-Feature-Name: keep
        X-Trace-Id: keep
        Content-Type: keep
        Authorization: redact
