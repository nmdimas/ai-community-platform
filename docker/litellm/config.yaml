model_list:
  # ── Primary model ────────────────────────────────
  - model_name: minimax/minimax-m2.5
    litellm_params:
      model: openrouter/minimax/minimax-m2.5
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: gpt-4o-mini
    litellm_params:
      model: openrouter/minimax/minimax-m2.5
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Cheap models (paid, <$1/1M total) ───────────
  # DeepSeek V3.2: $0.25 input / $0.40 output — best value 2026
  - model_name: cheap
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2
      api_key: os.environ/OPENROUTER_API_KEY
  # Gemini 3.1 Flash Lite: $0.25 input / $1.50 output — 1M context, fastest
  - model_name: cheap
    litellm_params:
      model: openrouter/google/gemini-3.1-flash-lite-preview
      api_key: os.environ/OPENROUTER_API_KEY

  # Named aliases for direct access to cheap models
  - model_name: cheap/deepseek-v3.2
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: cheap/gemini-flash-lite
    litellm_params:
      model: openrouter/google/gemini-3.1-flash-lite-preview
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Free models (OpenRouter) ─────────────────────
  # "free" = single model_name with multiple deployments.
  # LiteLLM load-balances across them and auto-retries
  # on 429 (rate limit) using the next deployment.
  - model_name: free
    litellm_params:
      model: openrouter/qwen/qwen3-coder-480b:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20   # rate limit hint for load balancer
      tpm: 50000
  - model_name: free
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      tpm: 50000
  - model_name: free
    litellm_params:
      model: openrouter/google/gemini-3-flash-preview:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      tpm: 50000
  - model_name: free
    litellm_params:
      model: openrouter/deepseek/deepseek-r1:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      tpm: 50000
  - model_name: free
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      tpm: 50000
  - model_name: free
    litellm_params:
      model: openrouter/google/gemini-2.5-flash:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      tpm: 50000
  - model_name: free
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      tpm: 50000

  # Named aliases for direct access to specific free models
  - model_name: free/qwen-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder-480b:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: free/deepseek-v3.2
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: free/gemini-3-flash
    litellm_params:
      model: openrouter/google/gemini-3-flash-preview:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: free/deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: free/llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: free/gemini-flash
    litellm_params:
      model: openrouter/google/gemini-2.5-flash:free
      api_key: os.environ/OPENROUTER_API_KEY

router_settings:
  routing_strategy: "least-busy"         # розподіляє запити між deployments
  num_retries: 3                          # кількість retry при 429
  retry_after: 5                          # секунд між retry
  allowed_fails: 3                        # скільки 429 перед cooldown
  cooldown_time: 60                       # секунд cooldown для провайдера що впав
  enable_pre_call_checks: true            # перевіряє rpm/tpm перед дзвінком

general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  maximum_spend_logs_retention_period: "7d"
  maximum_spend_logs_retention_interval: "1d"

litellm_settings:
  set_verbose: true
  database_url: os.environ/DATABASE_URL
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
